name: Deploy Frontend

on:
  push:
    branches: [master]

# Secrets cần thiết (Settings > Secrets and variables > Actions):
#   DOCKER_USERNAME    - Docker Hub username
#   DOCKER_PASSWORD    - Docker Hub access token
#   VPS_HOST           - IP hoặc hostname của VPS
#   VPS_USER           - SSH username (vd: ubuntu, root)
#   VPS_SSH_KEY        - Nội dung private key SSH (-----BEGIN OPENSSH PRIVATE KEY-----)
#   VPS_PROJECT_PATH   - Đường dẫn tới thư mục environment trên VPS
#                        (vd: /home/ubuntu/finance/FinanceManagement/environment)

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:1.0 .
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:1.0

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
