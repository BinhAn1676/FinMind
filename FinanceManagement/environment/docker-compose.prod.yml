version: '3.4'

# ============================================================
# docker-compose.prod.yml - Production deployment
# ============================================================
# Yêu cầu: tạo file .env trong thư mục này với nội dung từ .env.example
# Chạy: docker compose -f docker-compose.prod.yml --env-file .env up -d
# ============================================================

x-network-config: &network-deploy-service
  networks:
    - event-network
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

networks:
  event-network:
    driver: bridge

volumes:
  mysql_main_data:
  mongodb_main_data:
  postgres_ai_data:
  kafka1_data:
  traefik_certs:

services:

  # ============================================================
  # Traefik - Reverse Proxy + Auto SSL (Let's Encrypt)
  # Xử lý tất cả traffic vào: HTTP redirect → HTTPS
  # Subdomains:
  #   ${DOMAIN}          → frontend
  #   api.${DOMAIN}      → API Gateway
  #   auth.${DOMAIN}     → Keycloak
  #   files.${DOMAIN}    → MinIO S3 (presigned URLs)
  # ============================================================

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      # Dùng file provider thay vì docker provider để tránh lỗi Docker API version
      # (Docker Engine 29+ yêu cầu API 1.44, Traefik v3.3 mặc định dùng 1.24)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Tự động redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Let's Encrypt TLS challenge
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/letsencrypt
    networks:
      - event-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================================
  # Infrastructure
  # ============================================================

  redis:
    <<: *network-deploy-service
    container_name: redis
    image: redislabs/redismod:latest
    restart: unless-stopped
    # Không expose port ra ngoài host trong production

  minio:
    <<: *network-deploy-service
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: minio
    restart: unless-stopped
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
      # Cho MinIO biết URL công khai để tạo presigned URL đúng
      - MINIO_BROWSER_REDIRECT_URL=https://files.${DOMAIN}
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 20s
      retries: 5
    labels:
      - "traefik.enable=true"
      # S3 API - dùng cho presigned URLs (browser access)
      - "traefik.http.routers.minio.rule=Host(`files.${DOMAIN}`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls.certresolver=letsencrypt"
      - "traefik.http.routers.minio.service=minio-s3"
      - "traefik.http.services.minio-s3.loadbalancer.server.port=9000"

  keycloak:
    <<: *network-deploy-service
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: keycloak
    restart: unless-stopped
    volumes:
      - ./keycloak-export/conf:/opt/keycloak/conf
      - ./keycloak-export/data:/opt/keycloak/data
      - ./keycloak-export/themes:/opt/keycloak/themes
      - ./keycloak-export/providers:/opt/keycloak/providers
    environment:
      KEYCLOAK_ADMIN: "admin"
      KEYCLOAK_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD}"
    # start-dev với data volume để giữ nguyên dữ liệu đã có
    # Ghi chú: migrate sang PostgreSQL cho production thực sự sau này
    command: >
      start-dev
      --http-port=7080
      --hostname=auth.finmind.pro.vn
      --hostname-strict=false
      --proxy-headers=xforwarded
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=7080"

  mysql-main:
    <<: *network-deploy-service
    image: mysql:8.0
    container_name: mysql_main
    restart: unless-stopped
    volumes:
      - mysql_main_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--skip-character-set-client-handshake'
    ]
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: user
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  postgres-ai:
    <<: *network-deploy-service
    image: pgvector/pgvector:pg16
    container_name: postgres_ai
    restart: unless-stopped
    volumes:
      - postgres_ai_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: finance_ai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mongodb-main:
    <<: *network-deploy-service
    image: mongo:7
    container_name: mongodb_main
    restart: unless-stopped
    command: ["--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_ROOT_PASSWORD}"
    volumes:
      - mongodb_main_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh -u root -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval 'db.runCommand({ connectionStatus: 1 }).ok' | grep 1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  mongodb-main-init:
    <<: *network-deploy-service
    image: mongo:7
    depends_on:
      mongodb-main:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
        mongosh --host mongodb-main:27017 -u root -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval '
          db = db.getSiblingDB(\"finance\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"files\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"notifications\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"chat\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"finance_ai_chat\");
          db.createCollection(\"_init\");
          print(\"All MongoDB databases initialized\");
        ' || true
      "

  # kafka-ui: REMOVED - không cần trong production

  kafka1:
    <<: *network-deploy-service
    image: "apache/kafka:3.8.0"
    container_name: kafka1
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "EXTERNAL://${VPS_IP}:9194,PLAINTEXT://kafka1:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093"
      CLUSTER_ID: "LelNs91FQk1UFvXCEcqRWA"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: "604800000"
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka1_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 10

  # ============================================================
  # Microservices
  # ============================================================

  configserver:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}configserver:1.0"
    container_name: configserver
    restart: unless-stopped
    depends_on:
      kafka1:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://configserver:8071/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  eurekaserver:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}eurekaserver:1.0"
    container_name: eurekaserver
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      JAVA_OPTS: "-Xmx512m -Xms256m -Dspring.config.import=configserver:http://configserver:8071/ -Dspring.cloud.config.uri=http://configserver:8071"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://eurekaserver:8070/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  users:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}users:1.0"
    container_name: users
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mysql-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "users"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      SERVER_PORT: 8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-main:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      MINIO_URL: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      JAVA_OPTS: "-Xmx512m -Xms256m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://users:8081/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  finance:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}finance:1.0"
    container_name: finance
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mysql-main:
        condition: service_healthy
      mongodb-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "finances"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      SERVER_PORT: 8082
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-main:3306/finance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_HOST: mongodb-main
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: finance
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: "${MONGO_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      MINIO_URL: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      JAVA_OPTS: "-Xmx1g -Xms256m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://finance:8082/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 1536M
        reservations:
          memory: 512M

  notification:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}notification:1.0"
    container_name: notification
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mongodb-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "notify"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATA_MONGODB_HOST: mongodb-main
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: notifications
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: "${MONGO_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      JAVA_OPTS: "-Xmx512m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://notification:8083/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  fileservice:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}fileservice:1.0"
    container_name: fileservice
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mongodb-main:
        condition: service_healthy
      minio:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "files"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      SERVER_PORT: 8085
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATA_MONGODB_HOST: mongodb-main
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: files
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: "${MONGO_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      MINIO_URL: "http://minio:9000"
      # URL công khai - browser dùng URL này để download qua presigned URL
      MINIO_PUBLIC_URL: "https://files.${DOMAIN}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      JAVA_OPTS: "-Xmx384m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8085/actuator/health | grep UP || [ \"$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8085/actuator/health)\" = \"401\" ]"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  keymanagement:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}keymanagement:1.0"
    container_name: keymanagement
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mysql-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "keys"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      SERVER_PORT: 8084
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-main:3306/key?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "root"
      SPRING_DATASOURCE_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      GOOGLE_CLOUD_KMS_ENABLED: "true"
      GOOGLE_CLOUD_PROJECT_ID: "finance-1676"
      GOOGLE_CLOUD_KMS_LOCATION: "asia-southeast1"
      GOOGLE_CLOUD_KMS_KEY_RING: "annb-key-ring"
      GOOGLE_CLOUD_KMS_CRYPTO_KEY: "finance-key"
      GOOGLE_CLOUD_KMS_TIMEOUT_SECONDS: "120"
      GOOGLE_CLOUD_KMS_RETRY_ATTEMPTS: "3"
      GOOGLE_CLOUD_CREDENTIALS_FILE: "/app/credentials/gcp-credentials.json"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      JAVA_OPTS: "-Xmx512m -Xms256m"
    volumes:
      # Copy file gcp-credentials.json lên VPS và set GCP_CREDENTIALS_PATH trong .env
      - ${GCP_CREDENTIALS_PATH}:/app/credentials/gcp-credentials.json:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8084/actuator/health | grep UP || [ \"$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8084/actuator/health)\" = \"401\" ]"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  chat:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}chat:1.0"
    container_name: chat
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      mongodb-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      kafka1:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "chat"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATA_MONGODB_HOST: mongodb-main
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: chat
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: "${MONGO_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      JAVA_OPTS: "-Xmx384m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://chat:8086/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  gatewayserver:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}gatewayserver:1.0"
    container_name: gatewayserver
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      redis:
        condition: service_started
      users:
        condition: service_healthy
      finance:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      SPRING_DATA_REDIS_CONNECT_TIMEOUT: "2s"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: "1s"
      JAVA_OPTS: "-Xmx384m -Xms128m"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://gatewayserver:8072/actuator/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    labels:
      - "traefik.enable=true"
      # API Gateway - tất cả API calls từ browser
      - "traefik.http.routers.gateway.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.gateway.entrypoints=websecure"
      - "traefik.http.routers.gateway.tls.certresolver=letsencrypt"
      - "traefik.http.services.gateway.loadbalancer.server.port=8072"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  aiservice:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}aiservice:1.0"
    container_name: aiservice
    restart: unless-stopped
    depends_on:
      configserver:
        condition: service_healthy
      postgres-ai:
        condition: service_healthy
      mongodb-main:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: "ai"
      SPRING_PROFILES_ACTIVE: default
      SPRING_CONFIG_IMPORT: configserver:http://configserver:8071/
      SPRING_CLOUD_CONFIG_URI: "http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-ai:5432/finance_ai?useSSL=false&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "postgres"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD}"
      SPRING_DATA_MONGODB_HOST: mongodb-main
      SPRING_DATA_MONGODB_PORT: 27017
      SPRING_DATA_MONGODB_DATABASE: finance_ai_chat
      SPRING_DATA_MONGODB_USERNAME: root
      SPRING_DATA_MONGODB_PASSWORD: "${MONGO_ROOT_PASSWORD}"
      SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE: admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_AI_VECTORSTORE_REDIS_URI: "redis://redis:6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka1:9092"
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: "kafka1:9092"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://keycloak:7080/realms/finance/protocol/openid-connect/certs"
      SPRING_AI_GOOGLE_GENAI_API_KEY: "${GEMINI_API_KEY}"
      SPRING_AI_GOOGLE_GENAI_CHAT_OPTIONS_MODEL: "gemini-2.5-flash"
      SPRING_AI_GOOGLE_GENAI_EMBEDDING_API_KEY: "${GEMINI_API_KEY}"
      SPRING_AI_GOOGLE_GENAI_EMBEDDING_TEXT_OPTIONS_MODEL: "gemini-embedding-001"
      SPRING_AI_GOOGLE_GENAI_EMBEDDING_TEXT_OPTIONS_DIMENSIONS: "768"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8087/actuator/health/readiness | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  frontend:
    <<: *network-deploy-service
    image: "${DOCKER_REGISTRY:-}frontend:1.0"
    container_name: frontend
    restart: unless-stopped
    depends_on:
      gatewayserver:
        condition: service_healthy
    volumes:
      # Rewrite hardcoded localhost URLs (http://localhost:8072, http://localhost:7080/)
      # sang production HTTPS URLs lúc nginx serve — không cần rebuild image
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
