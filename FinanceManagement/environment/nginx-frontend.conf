server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Rewrite hardcoded localhost URLs to production HTTPS URLs
    # sub_filter requires gzip off (cannot filter compressed responses)
    gzip off;
    sub_filter_once off;
    sub_filter_types *;
    sub_filter 'http://localhost:8072' 'https://api.finmind.pro.vn';
    sub_filter 'http://localhost:7080/' 'https://auth.finmind.pro.vn/';
    sub_filter 'http://localhost:8083' 'https://api.finmind.pro.vn';
    sub_filter 'http://localhost:8086' 'https://api.finmind.pro.vn';
    sub_filter 'http://localhost:4200' 'https://finmind.pro.vn';
    sub_filter 'http://localhost:80' 'https://finmind.pro.vn';

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
