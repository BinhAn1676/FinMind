version: '3.4'

x-network-config: &network-deploy-service
  networks:
    - event-network

networks:
  event-network:
    driver: bridge

volumes:
  # Consolidated MySQL - chứa tất cả MySQL databases
  mysql_main_data:
  # Consolidated MongoDB - chứa tất cả MongoDB databases
  mongodb_main_data:
  # PostgreSQL giữ riêng cho AIService
  postgres_ai_data:

services:

  redis:
    <<: *network-deploy-service
    container_name: redis
    image: redislabs/redismod:latest
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  minio:
    <<: *network-deploy-service
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - 9000:9000  # S3 API
      - 9001:9001  # MinIO Console
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  keycloak:
    <<: *network-deploy-service
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: keycloak
    ports:
      - "7080:7080"
    volumes:
      - ./keycloak-export/conf:/opt/keycloak/conf
      - ./keycloak-export/data:/opt/keycloak/data
      - ./keycloak-export/themes:/opt/keycloak/themes
      - ./keycloak-export/providers:/opt/keycloak/providers
    environment:
      KEYCLOAK_ADMIN: "admin"
      KEYCLOAK_ADMIN_PASSWORD: "admin"
    command: "start-dev --http-port=7080"
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # Consolidated MySQL Instance
  # Chứa tất cả MySQL databases: user, finance, key
  # ============================================
  mysql-main:
    <<: *network-deploy-service
    image: mysql:8.0
    container_name: mysql_main
    volumes:
      - mysql_main_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: [
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--skip-character-set-client-handshake'
    ]
    environment:
      MYSQL_ROOT_PASSWORD: root
      # Tạo databases ban đầu (sẽ được tạo bởi init script nếu chưa có)
      MYSQL_DATABASE: user
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # PostgreSQL for AIService (with pgvector for RAG)
  postgres-ai:
    <<: *network-deploy-service
    image: pgvector/pgvector:pg16
    container_name: postgres_ai
    volumes:
      - postgres_ai_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_ai
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # Consolidated MongoDB Instance
  # Chứa tất cả MongoDB databases:
  # - finance (FinanceService - group planning)
  # - files (FileService)
  # - notifications (NotificationService)
  # - chat (ChatService)
  # - finance_ai_chat (AIService - chat history)
  # ============================================
  mongodb-main:
    <<: *network-deploy-service
    image: mongo:7
    container_name: mongodb_main
    # Không dùng replica set cho development để đơn giản và tiết kiệm RAM
    command: ["--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    volumes:
      - mongodb_main_data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh -u root -p root --authenticationDatabase admin --eval 'db.runCommand({ connectionStatus: 1 }).ok' | grep 1 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 256M

  # MongoDB init - tạo databases khi container khởi động
  mongodb-main-init:
    <<: *network-deploy-service
    image: mongo:7
    depends_on:
      mongodb-main:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
        mongosh --host mongodb-main:27017 -u root -p root --authenticationDatabase admin --eval '
          db = db.getSiblingDB(\"finance\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"files\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"notifications\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"chat\");
          db.createCollection(\"_init\");
          db = db.getSiblingDB(\"finance_ai_chat\");
          db.createCollection(\"_init\");
          print(\"All MongoDB databases initialized\");
        ' || true
      "

  kafka-ui:
    <<: *network-deploy-service
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"  # Map Kafka UI to port 8080 on the host
    depends_on:
      kafka1:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: env-ddd
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092  # Cluster bootstrap servers
      DYNAMIC_CONFIG_ENABLED: 'true'
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Kafka cluster
  kafka1:
    <<: *network-deploy-service
    image: "apache/kafka:3.8.0"
    container_name: kafka1
    ports:
      - "9192:9092"  # Broker port
      - "9193:9093"  # Controller port
      - "9194:9094"  # External port
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "EXTERNAL://192.168.0.101:9194,PLAINTEXT://kafka1:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka1:9093"
      CLUSTER_ID: "LelNs91FQk1UFvXCEcqRWA"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_MS: "604800000"
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - ./data/apache/kafka1:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092" ]
      interval: 5s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

