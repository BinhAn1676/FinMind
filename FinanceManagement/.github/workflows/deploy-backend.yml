          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build & Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/eurekaserver:1.0 ./EurekaServer
          docker push ${{ secrets.DOCKER_USERNAME }}/eurekaserver:1.0
      - name: Deploy on VPS
